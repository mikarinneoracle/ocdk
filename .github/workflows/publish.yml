# Publish @mikarinneoracle/oci-cdk to npm using Trusted Publishing (OIDC).
# Runs on every push to main and publishes the current package version.
#
# One-time npm setup (fixes 404 / "token expired" if not done):
#   1. npmjs.com → your org @mikarinneoracle → Packages → create/link oci-cdk, set Access: Public
#   2. Package page → Automation → Trusted publishers → Add GitHub Actions
#      Repository: mikarinneoracle/ocdk
#      Workflow file: .github/workflows/publish.yml
#      Ref (branch): main
#   https://docs.npmjs.com/trusted-publishers

name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Clear deprecated npm config
        run: npm config delete always-auth 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      # Trusted Publishing requires npm 11.5.1+
      - name: Use npm for Trusted Publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish --provenance --access public
