# Publish @mikarinneoracle/oci-cdk to npm using Trusted Publishing (OIDC).
# Runs on every push to main and publishes the current package version.
#
# One-time npm setup (fixes 404 / "token expired" if not done):
#   1. npmjs.com → your org @mikarinneoracle → Packages → create/link oci-cdk, set Access: Public
#   2. Package page → Automation → Trusted publishers → Add GitHub Actions
#      Repository: mikarinneoracle/ocdk
#      Workflow file: .github/workflows/publish.yml
#      Ref (branch): main
#   https://docs.npmjs.com/trusted-publishers

name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Clear deprecated npm config
        run: npm config delete always-auth 2>/dev/null || true

      - name: Install dependencies
        run: npm ci

      - name: Install Fn CLI
        run: |
          curl -LSs https://raw.githubusercontent.com/fnproject/cli/master/install | sh
          fn version

      - name: Generate Java Dockerfile with fn CLI
        run: |
          rm -rf function
          mkdir -p function && cd function
          fn init --runtime java
          fn build -v 2>&1 | tee ../fnbuild.log
          cd ..
          # Extract Dockerfile from fn build -v output (between ----------------------------------- lines)
          sed -n '/^-----------------------------------$/,/^-----------------------------------$/p' fnbuild.log | tail -n +2 | head -n -1 > function/Dockerfile
          echo "Extracted Dockerfile:"
          cat function/Dockerfile
          rm -f fnbuild.log

      - name: Sync Java Dockerfile with oci-stack.ts
        id: sync_java
        run: |
          set +e
          out=$(node scripts/sync-java-dockerfile.mjs 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -eq 2 ]; then
            echo "Java sync skipped (function/Dockerfile missing or markers not found), continuing."
            result="unchanged"
          else
            result=$(echo "$out" | tail -1)
          fi
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          [ "$code" -eq 0 ] || [ "$code" -eq 2 ] || exit "$code"

      - name: Remove function dir
        run: rm -rf function

      - name: Generate Python Dockerfile with fn CLI
        run: |
          rm -rf function
          mkdir -p function && cd function
          fn init --runtime python
          fn build -v 2>&1 | tee ../fnbuild.log
          cd ..
          sed -n '/^-----------------------------------$/,/^-----------------------------------$/p' fnbuild.log | tail -n +2 | head -n -1 > function/Dockerfile
          echo "Extracted Python Dockerfile:"
          cat function/Dockerfile
          rm -f fnbuild.log

      - name: Sync Python Dockerfile with oci-stack.ts
        id: sync_python
        run: |
          set +e
          out=$(node scripts/sync-python-dockerfile.mjs 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -eq 2 ]; then
            echo "Python sync skipped (function/Dockerfile missing or markers not found), continuing."
            result="unchanged"
          else
            result=$(echo "$out" | tail -1)
          fi
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          [ "$code" -eq 0 ] || [ "$code" -eq 2 ] || exit "$code"

      - name: Generate Node Dockerfile with fn CLI
        run: |
          rm -rf function
          mkdir -p function && cd function
          fn init --runtime node
          fn build -v 2>&1 | tee ../fnbuild.log
          grep -q 'fnproject/node' ../fnbuild.log || (echo "fn build did not output Node Dockerfile" && exit 1)
          cd ..
          sed -n '/^-----------------------------------$/,/^-----------------------------------$/p' fnbuild.log | tail -n +2 | head -n -1 > function/Dockerfile
          echo "Extracted Node Dockerfile:"
          cat function/Dockerfile
          rm -f fnbuild.log

      - name: Sync Node Dockerfile with oci-stack.ts
        id: sync_node
        run: |
          set +e
          out=$(node scripts/sync-node-dockerfile.mjs 2>&1)
          code=$?
          set -e
          echo "$out"
          if [ "$code" -eq 2 ]; then
            echo "Node sync skipped (function/Dockerfile missing or markers not found), continuing."
            result="unchanged"
          else
            result=$(echo "$out" | tail -1)
          fi
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$result" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          [ "$code" -eq 0 ] || [ "$code" -eq 2 ] || exit "$code"

      - name: Remove function dir before commit
        run: rm -rf function

      - name: Set version_bumped flag
        id: version_flag
        run: |
          bumped=false
          # If any Dockerfile sync updated, consider it a version bump trigger
          if [ "${{ steps.sync_java.outputs.result }}" = "updated" ] || [ "${{ steps.sync_python.outputs.result }}" = "updated" ] || [ "${{ steps.sync_node.outputs.result }}" = "updated" ]; then
            bumped=true
          fi
          # Also treat a change to package.json in the latest commit as a version bump,
          # but only for push-triggered runs (avoid nightly schedule re-publishing same version)
          if [ "${{ github.event_name }}" = "push" ] && git diff --name-only HEAD~1..HEAD | grep -q '^package.json$'; then
            bumped=true
          fi
          echo "version_bumped=${bumped}" >> $GITHUB_OUTPUT

      - name: Bump version and push if Dockerfile was updated
        if: steps.sync_java.outputs.result == 'updated' || steps.sync_python.outputs.result == 'updated' || steps.sync_node.outputs.result == 'updated'
        run: |
          npm version patch --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/oci-stack.ts package.json
          git status
          git diff --cached --stat
          git commit -m "chore: sync Java/Python/Node Dockerfile with fn CLI [skip ci]" || true
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main || true

      # Trusted Publishing requires npm 11.5.1+
      - name: Use npm for Trusted Publishing
        if: steps.version_flag.outputs.version_bumped == 'true'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.version_flag.outputs.version_bumped == 'true'
        run: npm publish --provenance --access public
